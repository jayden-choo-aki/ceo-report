<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>패션 매장 인터랙티브 보고서</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f4f6fa;
    --card: #ffffff;
    --line: #e5e9f2;
    --ink: #1a2235;
    --muted: #6b7589;
    --brand: #2f6bff;
    --brand-soft: #e6efff;
    --good: #1aa472;
    --bad: #d94646;
    --warn: #d97706;
    --soft: #f0f3fb;
    --navy: #0f1c3f;
    --gold: #c9a55a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  /* Top bar */
  header.top {
    background: #fff; border-bottom: 1px solid var(--line);
    padding: 14px 28px; position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 24px;
  }
  header.top .logo {
    font-size: 14px; font-weight: 700; letter-spacing: 1px;
    color: var(--navy); white-space: nowrap;
  }
  header.top .logo span { color: var(--gold); }
  header.top nav.crumbs {
    display: flex; align-items: center; gap: 6px; font-size: 13px;
    flex: 1; overflow-x: auto;
  }
  header.top nav.crumbs a {
    color: var(--muted); text-decoration: none; padding: 4px 8px; border-radius: 6px;
    white-space: nowrap;
  }
  header.top nav.crumbs a:hover { background: var(--soft); color: var(--brand); }
  header.top nav.crumbs a.current { color: var(--ink); font-weight: 600; }
  header.top nav.crumbs .sep { color: #c0c6d4; font-size: 12px; }
  header.top .home-btn {
    background: var(--brand); color: #fff; text-decoration: none;
    padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
  }

  main.wrap { max-width: 1380px; margin: 0 auto; padding: 28px 24px 64px; }

  /* Common */
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px 22px;
    margin-bottom: 18px;
  }
  .card h2 {
    font-size: 15px; margin: 0 0 14px; display: flex; justify-content: space-between; align-items: center;
  }
  .card h2 .sub { font-size: 12px; color: var(--muted); font-weight: 500; }

  /* KPI */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 18px;
  }
  .kpi-grid.k4 { grid-template-columns: repeat(4, 1fr); }
  .kpi {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px;
  }
  .kpi .label { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
  .kpi .value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .kpi .sub-value { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .kpi .delta { font-size: 12px; margin-top: 6px; }
  .delta.up { color: var(--good); }
  .delta.down { color: var(--bad); }

  /* Page title */
  .page-title {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--line);
  }
  .page-title h1 { font-size: 24px; margin: 0 0 4px; letter-spacing: -0.5px; }
  .page-title .desc { color: var(--muted); font-size: 13px; }
  .page-title .badge {
    display: inline-block; background: var(--brand-soft); color: var(--brand);
    padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; margin-right: 6px;
  }

  /* Hub entries (home) */
  .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .hub-card {
    background: linear-gradient(135deg, #fff 0%, #f6f8fd 100%);
    border: 1px solid var(--line); border-radius: 14px; padding: 32px 36px;
    cursor: pointer; transition: all 0.18s; text-decoration: none; color: var(--ink);
    display: block;
  }
  .hub-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(15,28,63,0.08); border-color: var(--brand); }
  .hub-card .h-icon { font-size: 26px; margin-bottom: 14px; }
  .hub-card .h-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--navy); }
  .hub-card .h-desc { color: var(--muted); font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
  .hub-card .h-stats {
    display: flex; gap: 24px; padding-top: 16px; border-top: 1px solid var(--line);
  }
  .hub-card .h-stats .s {
    font-size: 12px; color: var(--muted);
  }
  .hub-card .h-stats .s b { display: block; color: var(--ink); font-size: 18px; margin-top: 2px; }

  /* Categories grid (level 2) */
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .cat {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 22px 24px; cursor: pointer; transition: all 0.18s; text-decoration: none; color: var(--ink);
    display: block;
  }
  .cat:hover { border-color: var(--brand); box-shadow: 0 4px 14px rgba(47,107,255,0.08); }
  .cat .c-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .cat .c-dot { width: 12px; height: 12px; border-radius: 4px; }
  .cat .c-name { font-size: 17px; font-weight: 700; color: var(--navy); }
  .cat .c-count { font-size: 11.5px; color: var(--muted); background: var(--soft); padding: 3px 8px; border-radius: 99px; }
  .cat .c-rev { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .cat .c-row {
    display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted);
    padding-top: 12px; margin-top: 12px; border-top: 1px dashed var(--line);
  }
  .cat .c-row b { color: var(--ink); }
  .cat .bar { height: 6px; background: var(--soft); border-radius: 99px; overflow: hidden; margin-top: 8px; }
  .cat .bar > span { display: block; height: 100%; }

  /* SKU grid (level 3) */
  .sku-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .pcard {
    border: 1px solid var(--line); border-radius: 12px; background: #fff;
    overflow: hidden; display: flex; flex-direction: column;
    cursor: pointer; transition: all 0.18s; text-decoration: none; color: var(--ink);
  }
  .pcard:hover { border-color: var(--brand); box-shadow: 0 4px 14px rgba(47,107,255,0.08); transform: translateY(-2px); }
  .pcard .pimg {
    background: linear-gradient(135deg, #f7f8fb 0%, #eef1f7 100%);
    aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
    position: relative; border-bottom: 1px solid var(--line);
  }
  .pcard .pimg svg { width: 75%; height: 88%; }
  .pcard .rk-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--ink); color: #fff; font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
  }
  .pcard .pinfo { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .pcard .pcode { font-size: 11px; color: var(--muted); }
  .pcard .pname { font-size: 13px; font-weight: 600; line-height: 1.35; height: 36px; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .pcard .pprice { font-size: 14px; font-weight: 700; }
  .pcard .pstats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    padding-top: 8px; border-top: 1px dashed var(--line); font-size: 11px;
  }
  .pcard .pstats .k { color: var(--muted); }
  .pcard .pstats .v { color: var(--ink); font-weight: 600; }

  /* Store grid */
  .store-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .scard {
    background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px;
    cursor: pointer; transition: all 0.18s; text-decoration: none; color: var(--ink);
    display: block;
  }
  .scard:hover { border-color: var(--brand); box-shadow: 0 4px 14px rgba(47,107,255,0.08); }
  .scard .s-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .scard .s-name { font-size: 15px; font-weight: 700; }
  .scard .s-code { font-size: 10.5px; color: var(--muted); }
  .scard .s-rev { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .scard .s-row {
    display: flex; justify-content: space-between; font-size: 12px; color: var(--muted);
    margin-top: 6px;
  }
  .scard .s-row b { color: var(--ink); }
  .scard .s-bar { height: 5px; background: var(--soft); border-radius: 99px; overflow: hidden; margin-top: 10px; }
  .scard .s-bar > span { display: block; height: 100%; }

  /* Badges */
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .badge.green { background: #e6f7ef; color: var(--good); }
  .badge.red   { background: #fce8e8; color: var(--bad); }
  .badge.amber { background: #fef3e0; color: var(--warn); }
  .badge.gray  { background: var(--soft); color: var(--muted); }
  .badge.blue  { background: var(--brand-soft); color: var(--brand); }

  /* Grid layouts */
  .row { display: grid; gap: 14px; margin-bottom: 18px; }
  .row.r-2 { grid-template-columns: 1.4fr 1fr; }
  .row.r-3 { grid-template-columns: 1fr 1fr 1fr; }
  .chart-box { position: relative; height: 280px; }
  .chart-box.sm { height: 220px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 10px; text-align: right; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
  th { color: var(--muted); font-weight: 500; background: var(--soft); }
  tbody tr.clickable { cursor: pointer; }
  tbody tr.clickable:hover { background: #fafbfd; color: var(--brand); }
  tr:last-child td { border-bottom: none; }
  td.up { color: var(--good); }
  td.down { color: var(--bad); }

  /* SKU detail header */
  .sku-detail-head {
    display: grid; grid-template-columns: 240px 1fr; gap: 28px;
    background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 24px;
    margin-bottom: 18px;
  }
  .sku-detail-head .big-img {
    aspect-ratio: 1 / 1; background: linear-gradient(135deg,#f7f8fb,#eef1f7);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
  }
  .sku-detail-head .big-img svg { width: 80%; height: 88%; }
  .sku-detail-head .meta-tags { display: flex; gap: 6px; margin-bottom: 6px; }
  .sku-detail-head h2.name { font-size: 26px; margin: 0 0 8px; letter-spacing: -0.5px; }
  .sku-detail-head .desc { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .sku-detail-head .stat-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    padding-top: 16px; border-top: 1px solid var(--line);
  }
  .sku-detail-head .stat-row .s { }
  .sku-detail-head .stat-row .s .k { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .sku-detail-head .stat-row .s .v { font-size: 20px; font-weight: 700; }

  /* Color dot */
  .color-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle; border: 1px solid rgba(0,0,0,0.1);
  }

  @media (max-width: 1100px) {
    .kpi-grid, .kpi-grid.k4 { grid-template-columns: repeat(2, 1fr); }
    .hub-grid, .cat-grid, .sku-grid, .store-grid, .row.r-2, .row.r-3 { grid-template-columns: 1fr; }
    .sku-detail-head { grid-template-columns: 1fr; }
  }

  /* ============ 진입 / 호버 애니메이션 ============ */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes scale-in {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(47,107,255,0); }
    50%      { box-shadow: 0 0 0 8px rgba(47,107,255,0.06); }
  }

  /* 진입 시 단계적으로 떠오름 */
  .stagger > * {
    opacity: 0; animation: fade-up 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .stagger > *:nth-child(1) { animation-delay: 0.04s; }
  .stagger > *:nth-child(2) { animation-delay: 0.10s; }
  .stagger > *:nth-child(3) { animation-delay: 0.16s; }
  .stagger > *:nth-child(4) { animation-delay: 0.22s; }
  .stagger > *:nth-child(5) { animation-delay: 0.28s; }
  .stagger > *:nth-child(6) { animation-delay: 0.34s; }
  .stagger > *:nth-child(7) { animation-delay: 0.40s; }
  .stagger > *:nth-child(8) { animation-delay: 0.46s; }
  .stagger > *:nth-child(n+9) { animation-delay: 0.52s; }

  /* 페이지 본문 진입 */
  main.wrap.entering { animation: fade-in 0.35s ease-out; }

  /* KPI: hover 살짝 떠오름 + 값에 그라데이션 글로우 */
  .kpi {
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.2s, border-color 0.2s;
  }
  .kpi:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(15,28,63,0.08);
    border-color: rgba(47,107,255,0.25);
  }
  .kpi .value {
    background: linear-gradient(135deg, var(--navy) 0%, var(--brand) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
  }
  .kpi .value.is-bad {
    background: linear-gradient(135deg, var(--bad) 0%, #b73838 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Card hover (interactive 그리드들) */
  .card { transition: box-shadow 0.18s; }
  .card:hover { box-shadow: 0 4px 14px rgba(15,28,63,0.05); }

  /* Hub 카드 진입 강조 */
  .hub-card { animation: scale-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .hub-card:nth-child(2) { animation-delay: 0.08s; }

  /* SKU 카드 hover */
  .pcard .pimg svg { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .pcard:hover .pimg svg { transform: scale(1.06) rotate(-1.5deg); }

  /* 매장 카드 진행률 바: 진입 시 0→target 너비 애니메이션 */
  .scard .s-bar > span, .cat .bar > span {
    transform-origin: left;
    animation: bar-grow 1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes bar-grow {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* 차트 컨테이너 진입 시 살짝 떠오름 */
  .chart-box { animation: fade-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; animation-delay: 0.15s; }

  /* 브레드크럼 진입 */
  header.top nav.crumbs a { transition: background 0.15s, color 0.15s; }

  /* 클릭 가능한 테이블 행에 호버 강조 */
  tbody tr.clickable { transition: background 0.15s, color 0.15s, transform 0.12s; }
  tbody tr.clickable:hover { transform: translateX(2px); }
</style>
</head>
<body>

<header class="top">
  <div class="logo">OO <span>FASHION</span> · INTERACTIVE</div>
  <nav class="crumbs" id="crumbs"></nav>
  <a href="#home" class="home-btn">홈</a>
</header>

<main class="wrap" id="view"></main>

<script>
/* ===========================================================
 *  1. 데이터 생성 (시드 기반)
 * =========================================================== */
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
}
const rand = mulberry32(20260424);
function gaussian(mean, sd) {
  let u = 0, v = 0;
  while (u === 0) u = rand();
  while (v === 0) v = rand();
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
const pick = (arr) => arr[Math.floor(rand() * arr.length)];

const fmtKRW   = (v) => '₩ ' + Math.round(v).toLocaleString('ko-KR');
const fmtNum   = (v) => v.toLocaleString('ko-KR');
const fmtEok   = (v) => '₩ ' + (v/100000000).toFixed(2) + '억';
const fmtMan   = (v) => Math.round(v/10000).toLocaleString('ko-KR') + '만';

/* 카테고리 */
const categories = [
  { key:'out',    name:'아우터',   color:'#2f6bff', basePrice: 280000, share: 0.311 },
  { key:'top',    name:'상의',     color:'#1aa472', basePrice: 78000,  share: 0.248 },

  { key:'acc',    name:'액세서리', color:'#8b5cf6', basePrice: 65000,  share: 0.078 },
  { key:'etc',    name:'기타',     color:'#6b7280', basePrice: 88000,  share: 0.045 }

/* SKU 템플릿 (카테고리별 8개 = 48 SKU) */
const skuTemplates = {

  ],
  top: [
    {n:'옥스포드 셔츠',       f:'레귤러', fab:'코튼'},
    {n:'실크 블라우스',       f:'슬림',   fab:'실크'},
    {n:'캐시미어 라운드 니트',f:'슬림',   fab:'캐시미어'},

  ],
  bottom: [

    {n:'스키니 진',           f:'스키니', fab:'스트레치 데님'},
    {n:'플레어 미디 스커트',  f:'플레어', fab:'폴리혼방'},

    {n:'카고 와이드 팬츠',    f:'와이드', fab:'코튼'},
    {n:'치노 슬림 팬츠',      f:'슬림',   fab:'코튼'},
    {n:'리브 레깅스',         f:'슬림',   fab:'나일론 스판'}
  ],

function storeSkuQty(store, sku) {
  // store와 sku의 idx를 시드로 결합
  const seed = store.idx * 137 + sku.idx * 91;
  const r = mulberry32(seed);
  const base = sku.qty / 100; // 평균 매장당 판매
  const variation = (0.4 + r() * 1.6) * store._multi * sku._popularity;
  // 카테고리별 매장 적합도 (약간의 노이즈)
  return Math.max(0, Math.round(base * variation));
}
function storeSkuRevenue(store, sku) {
  return storeSkuQty(store, sku) * sku.price;
}

/* 차트별 stagger / progressive 옵션 적용 */
function chartAnim(type) {
  if (type === 'bar') {
    return {
      animation: { duration: 950, easing: 'easeOutCubic',
        delay: (ctx) => ctx.type==='data' ? ctx.dataIndex * 40 : 0 }
    };
  }
  if (type === 'line') {
    return {
      animation: { duration: 1400, easing: 'easeOutQuart' },
      animations: {
        y: {
          type: 'number', easing: 'easeOutQuart', duration: 900,
          from: (ctx) => {
            if (ctx.type !== 'data') return undefined;
            const scale = ctx.chart.scales.y;
            return scale ? scale.getPixelForValue(0) : 0;
          },
          delay: (ctx) => ctx.type==='data' ? ctx.dataIndex * 25 : 0
        }
      }
    };
  }
  if (type === 'doughnut' || type === 'pie') {
    return {
      animation: { animateRotate: true, animateScale: true, duration: 1300, easing: 'easeOutCubic' }
    };
  }
  if (type === 'scatter') {
    return {
      animation: { duration: 1100, easing: 'easeOutQuart',
        delay: (ctx) => ctx.type==='data' ? Math.min(ctx.dataIndex * 8, 600) : 0 }
    };
  }
  return {};
}

/* 차트 헬퍼 — 애니메이션 자동 적용 */
function makeChart(canvasId, config) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  const extra = chartAnim(config.type);
  config.options = config.options || {};
  if (extra.animation)  config.options.animation  = { ...(config.options.animation||{}),  ...extra.animation };
  if (extra.animations) config.options.animations = { ...(config.options.animations||{}), ...extra.animations };
  const c = new Chart(ctx, config);
  activeCharts.push(c);
  return c;
}

/* KPI / 큰 숫자 카운트업 */
function animateValues(root) {
  const targets = root.querySelectorAll('.kpi .value, .cat .c-rev, .scard .s-rev, .pcard .pprice');
  targets.forEach(elx => {
    const text = elx.textContent;
    if (text.includes('/')) return;
    if (elx.dataset.animated) return;
    const match = text.match(/^([^\d\-]*)(-?[\d,]+\.?\d*)(.*)$/);
    if (!match) return;
    const prefix = match[1] || '';
    const numStr = match[2];
    const suffix = match[3] || '';
    const target = parseFloat(numStr.replace(/,/g,''));
    if (isNaN(target)) return;

    const isInt = !numStr.includes('.');
    elx.dataset.animated = '1';
    const startT = performance.now();
    const duration = 850;
    function step(now) {
      const t = Math.min(1, (now - startT) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const v = target * eased;
      const vStr = isInt
        ? Math.round(v).toLocaleString('ko-KR')
        : (Math.abs(target) >= 100 ? v.toFixed(1) : v.toFixed(2));
      elx.textContent = prefix + vStr + suffix;
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

function render(html, crumbs) {
  destroyCharts();

      .forEach(g => g.classList.add('stagger'));
  // KPI 카운터
  requestAnimationFrame(() => animateValues(view));
  renderCrumbs(crumbs);
  window.scrollTo({top:0, behavior:'instant'});
}
function renderCrumbs(items) {
  const c = document.getElementById('crumbs');
  c.innerHTML = items.map((it, i) => {
    const isLast = i === items.length - 1;
    const link = isLast
      ? `<a class="current">${it.label}</a>`
      : `<a href="#${it.href}">${it.label}</a>`;
    const sep = isLast ? '' : '<span class="sep">›</span>';
    return link + sep;
  }).join('');
}

/* ===========================================================
 *  10. 뷰: 매장 상세
 * =========================================================== */
function viewStore(storeCode) {
  const st = stores.find(s => s.code === storeCode);
  if (!st) return viewRegions();
  const r = regionAgg.find(x => x.key === st.regionKey);

  // 매장의 카테고리별 매출 (시드 기반 분배)
  const catBreak = catAgg.map(c => {
    // 카테고리 비중 × 매장 매출에 약간의 노이즈
    const seed = st.idx * 53 + c.key.charCodeAt(0);
    const noise = 0.7 + mulberry32(seed)() * 0.6;
    const rev = st.revenue * (c.revenue / totalCatRev) * noise;
    return { ...c, storeRev: rev };
  });
  const sumCat = catBreak.reduce((a,c)=>a+c.storeRev,0);
  catBreak.forEach(c => c.storeRev = c.storeRev / sumCat * st.revenue); // 정규화

  // 매장의 SKU별 판매
  const storeSkuList = skus.map(s => ({
    sku: s, qty: storeSkuQty(st, s), rev: storeSkuRevenue(st, s)
  })).sort((a,b)=> b.rev - a.rev);
  const top10sku = storeSkuList.slice(0, 10);

  // 일별 매출 (30일)
  const dayR = mulberry32(st.idx * 311);
  const days = Array.from({length:30}, (_,i)=> (i+1) + '일');
  const daily = days.map(() => Math.round(st.revenue / 30 * (0.6 + dayR()*0.9)));
  const sumDaily = daily.reduce((a,v)=>a+v,0);
  const normFactor = st.revenue / sumDaily;
  daily.forEach((_,i,a) => a[i] = Math.round(a[i] * normFactor / 10000));

  const statusBadge =
    st.status==='good' ? '<span class="badge green">목표 달성</span>' :
    st.status==='bad'  ? '<span class="badge red">적자</span>' :
                         '<span class="badge gray">목표 미달</span>';

  const html = `
    <div class="page-title">
      <div>
        <div class="meta-tags" style="display:flex;gap:6px;margin-bottom:8px;">
          <span class="badge blue">${r.name}</span>
          <span class="badge gray">${st.code}</span>
          ${statusBadge}
        </div>
        <h1>${st.name}</h1>
        <div class="desc">점장 ${st.manager} · 면적 ${st.area}㎡ · 직원 ${st.staff}명 · 전사 ${st.rank}위 / 100개 매장</div>
      </div>
    </div>

    <div class="kpi-grid k4">
      <div class="kpi"><div class="label">월 매출</div><div class="value">${fmtMan(st.revenue)}원</div><div class="delta ${st.momRev>=0?'up':'down'}">${st.momRev>=0?'▲':'▼'} ${Math.abs(st.momRev)}% (전월)</div></div>
      <div class="kpi"><div class="label">영업이익</div><div class="value">${fmtMan(st.profit)}원</div><div class="sub-value">이익률 ${st.margin}%</div></div>
      <div class="kpi"><div class="label">목표 달성률</div><div class="value">${st.goalRate}%</div><div class="sub-value">${st.status==='good'?'목표 초과 달성':'목표 미달'}</div></div>
      <div class="kpi"><div class="label">상권 내 순위</div><div class="value">${list_rankInRegion(st)}위 / ${r.storeCount}개</div><div class="sub-value">상권 ${r.name}</div></div>
    </div>

    <div class="row r-2">
      <div class="card">
        <h2>일별 매출 추이 <span class="sub">단위: 만원</span></h2>
        <div class="chart-box"><canvas id="dayChart"></canvas></div>
      </div>
      <div class="card">
        <h2>카테고리별 매출 비중</h2>
        <div class="chart-box"><canvas id="catPie"></canvas></div>
      </div>
    </div>

    <div class="card">
      <h2>이 매장의 베스트셀러 SKU TOP 10 <span class="sub">SKU 클릭 → 품목 상세</span></h2>
      <table>
        <thead><tr><th>순위</th><th>품목</th><th>카테고리</th><th>색상</th><th>단가</th><th>판매수량</th><th>매출</th><th>매장 매출 비중</th></tr></thead>
        <tbody>
          ${top10sku.map((x,i) => `
            <tr class="clickable" onclick="location.hash='products/${x.sku.category}/${x.sku.code}'">
              <td>${i+1}</td>
              <td>${x.sku.name} <span style="color:var(--muted)">· ${x.sku.code}</span></td>
              <td>${x.sku.categoryName}</td>
              <td><span class="color-dot" style="background:${x.sku.colorHex}"></span>${x.sku.colorName}</td>
              <td>${fmtKRW(x.sku.price)}</td>
              <td>${fmtNum(x.qty)}개</td>
              <td>${fmtMan(x.rev)}원</td>
              <td>${(x.rev/st.revenue*100).toFixed(1)}%</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>카테고리별 매장 매출 상세</h2>
      <table>
        <thead><tr><th>카테고리</th><th>매출</th><th>비중</th><th>전사 동 카테고리 대비</th></tr></thead>
        <tbody>
          ${catBreak.sort((a,b)=>b.storeRev-a.storeRev).map(c => {
            const share = (c.storeRev/st.revenue*100).toFixed(1);
            const vsAvg = (c.storeRev / (c.revenue / 100) - 1) * 100;
            const cls = vsAvg >= 0 ? 'up' : 'down';
            return `
            <tr>
              <td><span class="color-dot" style="background:${c.color}"></span>${c.name}</td>
              <td>${fmtMan(c.storeRev)}원</td>
              <td>${share}%</td>
              <td class="${cls}">${vsAvg>=0?'▲':'▼'} ${Math.abs(vsAvg).toFixed(1)}%</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
  render(html, [
    {label:'홈', href:'home'},
    {label:'매장', href:'stores'},
    {label:r.name, href:'stores/'+r.key},
    {label:st.name, href:'stores/'+r.key+'/'+st.code}
  ]);

  makeChart('dayChart', {
    type:'line',
    data:{ labels: days, datasets:[{
      label:'일매출(만원)', data: daily, borderColor:'#2f6bff',
      backgroundColor: (ctx) => {
        const chart = ctx.chart;
        const {ctx: c, chartArea} = chart;
        if (!chartArea) return 'rgba(47,107,255,0.08)';
        const g = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
        g.addColorStop(0, 'rgba(47,107,255,0.32)');
        g.addColorStop(1, 'rgba(47,107,255,0.00)');
        return g;
      },
      tension:0.35, pointRadius:0, pointHoverRadius:6,
      pointHoverBackgroundColor:'#2f6bff', pointHoverBorderColor:'#fff', pointHoverBorderWidth:2,
      borderWidth:2.5, fill:true
    }]},
    options:{ maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid:{display:false}}, y:{grid:{color:'#eef1f7'}, beginAtZero:true}}}
  });

  makeChart('catPie', {
    type:'doughnut',
    data:{ labels: catBreak.map(c=>c.name),
      datasets:[{ data: catBreak.map(c=>+c.storeRev.toFixed(0)),
        backgroundColor: catBreak.map(c=>c.color),
        borderWidth:0, hoverOffset: 10 }]},
    options:{ maintainAspectRatio:false, cutout:'62%',
      plugins:{ legend:{position:'right', labels:{boxWidth:10, padding:8, font:{size:11}}},
        tooltip:{callbacks:{label:(c)=> c.label+': '+fmtMan(c.parsed)+'원'}}}}
  });
}

/* 상권 내 매장 순위 헬퍼 */
function list_rankInRegion(st) {
  const list = stores.filter(s => s.regionKey === st.regionKey).sort((a,b)=> b.revenue - a.revenue);
  return list.findIndex(s => s.code === st.code) + 1;
}
</script>
</body>
</html>
